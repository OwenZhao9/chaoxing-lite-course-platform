<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">大学英语课程封面</title>
  <desc id="desc">A clean classroom scene with English study cards and course materials.</desc>
  <defs>
    <linearGradient id="wall" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fafc"/>
      <stop offset="1" stop-color="#e6f0f2"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" x2="1">
      <stop offset="0" stop-color="#d7b98a"/>
      <stop offset="1" stop-color="#b9894b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#wall)"/>
  <rect x="0" y="510" width="1200" height="210" fill="url(#desk)"/>
  <rect x="112" y="90" width="540" height="330" rx="22" fill="#233245"/>
  <rect x="142" y="122" width="480" height="266" rx="14" fill="#31465f"/>
  <text x="182" y="190" fill="#f8fafc" font-family="Arial, sans-serif" font-size="48" font-weight="700">College English</text>
  <text x="184" y="250" fill="#d9f99d" font-family="Arial, sans-serif" font-size="28">Reading · Listening · Writing</text>
  <line x1="184" y1="292" x2="560" y2="292" stroke="#93c5fd" stroke-width="10" stroke-linecap="round"/>
  <line x1="184" y1="330" x2="496" y2="330" stroke="#f9a8d4" stroke-width="10" stroke-linecap="round"/>
  <g transform="translate(720 120)">
    <rect x="0" y="0" width="330" height="210" rx="20" fill="#ffffff" stroke="#d5dde6" stroke-width="4"/>
    <text x="36" y="66" fill="#0f172a" font-family="Arial, sans-serif" font-size="32" font-weight="700">Vocabulary</text>
    <text x="36" y="116" fill="#475569" font-family="Arial, sans-serif" font-size="26">perspective</text>
    <text x="36" y="158" fill="#475569" font-family="Arial, sans-serif" font-size="22">awareness</text>
  </g>
  <g transform="translate(680 380) rotate(-7)">
    <rect x="0" y="0" width="360" height="160" rx="18" fill="#eef9f2" stroke="#9bd3b1" stroke-width="4"/>
    <text x="32" y="60" fill="#14532d" font-family="Arial, sans-serif" font-size="28" font-weight="700">Class Task</text>
    <text x="32" y="108" fill="#166534" font-family="Arial, sans-serif" font-size="22">Discuss cultural differences.</text>
  </g>
  <circle cx="185" cy="570" r="44" fill="#2563eb"/>
  <circle cx="278" cy="570" r="44" fill="#16a34a"/>
  <circle cx="371" cy="570" r="44" fill="#dc2626"/>
  <rect x="510" y="545" width="210" height="46" rx="8" fill="#f8fafc"/>
  <rect x="750" y="545" width="310" height="46" rx="8" fill="#f8fafc"/>
</svg>
